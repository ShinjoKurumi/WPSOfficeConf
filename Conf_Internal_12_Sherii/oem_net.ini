# 高版本生效，建议和 IgnoreSslErrors=true 一同加上
;HttpsSecurityBypass={"support" : true, "enable" : true, "filter" : false}

# 开机自启动加载项进程，解决授权打开 58890 端口弹窗问题（中国联通 11.8.2.11716）

# https://qn.cache.wpscdn.cn/encs/doc/office_v19/index.htm

# 指定是否要启用 JS 插件支持
# 开启 jsplugins.xml 模式，使 [server] 配置生效
;JsApiPlugin={"support" : true, "enable" : true, "filter" : false}

# 指定是否要启用 JS 插件调试器
# 打开开发者模式，允许打开 WPS 调试器
;JsApiShowWebDebugger={"support" : true, "enable" : true, "filter" : false}

# 是否禁用 JS 插件 IDE（GNU/Linux 11.8.2.11806）
# 具体的行为可能是「开发工具」选项卡直接消失，或无法切换 VB 和 JS 环境
;ShieldJSIDE={"support" : true, "enable" : true, "filter" : false}

# 是否支持 OA 助手短协议（默认不支持，新版本注意都要手动添加这个配置）
# 支持版本：Windows 11718 以后（不包含 11718）
;JsapiCustomProtocal={"support" : true, "enable" : true, "filter" : false}

# 解决弹出安装、卸载、授权访问 WPS 加载项的安全提醒弹窗问题
# 支持版本：Windows 10912 Linux 10386
;JsApiAuthWebsite={"support" : true, "enable" : true, "filter" : false}

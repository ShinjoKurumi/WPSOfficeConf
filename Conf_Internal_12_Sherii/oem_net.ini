;JsApiNotifyForModal={"support" : true, "enable" : true, "filter" : false}

# 打包 WPS 提供的 localhost 证书，解决当业务系统是 https 时，无法唤起 WPS 客户端的问题
# 国产机上这个配置不生效，需要手动导入证书
;JsapiUseHttpsServer={"support" : true, "enable" : true, "filter" : false}

# 忽略 WPS 加载项的 https 报错，允许使用自签名证书（WPS 365 技能认证版 11.1.0.14252）
